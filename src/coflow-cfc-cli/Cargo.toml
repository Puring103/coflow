[package]
name = "coflow-cfc-cli"
version = "0.7.1"
edition = "2021"
description = "Command-line tools for the CFC configuration language."
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "cfc"
path = "src/main.rs"

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }
unused_lifetimes = "warn"
unused_qualifications = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
missing_errors_doc = "warn"
must_use_candidate = "warn"
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
unimplemented = "warn"
unreachable = "warn"
dbg_macro = "warn"
print_stdout = "allow"
print_stderr = "allow"

[dependencies]
coflow-cft = { path = "../coflow-cft" }
coflow-cfd = { path = "../coflow-cfd" }
