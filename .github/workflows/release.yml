name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  ci:
    name: Release gate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync skill references
        shell: pwsh
        run: |
          pwsh scripts/sync-skill-references.ps1
          pwsh scripts/sync-skill-references.ps1 -Check
          $skillStatus = git status --porcelain -- skills
          if ($skillStatus) {
            $skillStatus
            throw "Skill references changed after sync. Commit synced files before release."
          }

      - name: Check workspace
        run: cargo check --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check TypeScript bindings
        shell: pwsh
        run: |
          cargo test --features ts-export -p cfd-editor export_bindings
          git diff --exit-code editors/cfd-editor/frontend/src/bindings

      - name: Test and build CFD editor frontend
        run: npm ci && npm test && npm run build
        working-directory: editors/cfd-editor/frontend

      - name: Test VS Code extension
        run: node editors/vscode-coflow/test/extension-unit.test.js

  build:
    name: Build ${{ matrix.name }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: coflow.exe
            archive: coflow-windows-x64.zip
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: coflow
            archive: coflow-macos-arm64.tar.gz
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: coflow
            archive: coflow-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}

  vsix:
    name: Build VSIX
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Package VSIX
        run: npx --yes @vscode/vsce package
        working-directory: editors/vscode-coflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: editors/vscode-coflow/*.vsix

  editor:
    name: Build CFD Editor ${{ matrix.name }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: cfd-editor.exe
            archive: cfd-editor-windows-x64.zip
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: cfd-editor
            archive: cfd-editor-macos-arm64.tar.gz
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: cfd-editor
            archive: cfd-editor-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install editor dependencies
        run: npm ci
        working-directory: editors/cfd-editor

      - name: Install editor frontend dependencies
        run: npm ci
        working-directory: editors/cfd-editor/frontend

      - name: Build editor
        run: node node_modules/@tauri-apps/cli/tauri.js build --target ${{ matrix.target }} --no-bundle
        working-directory: editors/cfd-editor

      - name: Package editor (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package editor (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Upload editor artifact
        uses: actions/upload-artifact@v4
        with:
          name: editor-${{ matrix.name }}
          path: ${{ matrix.archive }}

  windows-installer:
    name: Build Windows Installer
    needs: [build, editor]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts/cli

      - name: Download editor artifact
        uses: actions/download-artifact@v4
        with:
          name: editor-windows-x64
          path: artifacts/editor

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Prepare installer input
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows-installer/input
          Expand-Archive artifacts/cli/coflow-windows-x64.zip dist/windows-installer/input -Force
          Expand-Archive artifacts/editor/cfd-editor-windows-x64.zip dist/windows-installer/input -Force

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/windows/coflow-tools.iss "/DAppVersion=$version"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/windows-installer/output/*.exe

  release:
    name: Create Release
    needs: [build, vsix, editor, windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: RELEASE_NOTES.md
