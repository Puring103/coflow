name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  ci:
    name: Release gate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release version
        shell: pwsh
        run: |
          $line = Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          $version = $line.Matches[0].Groups[1].Value
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo version $version"
          }

      - name: Sync skill references
        shell: pwsh
        run: |
          pwsh scripts/sync-skill-references.ps1
          pwsh scripts/sync-skill-references.ps1 -Check
          $skillStatus = git status --porcelain -- skills
          if ($skillStatus) {
            $skillStatus
            throw "Skill references changed after sync. Commit synced files before release."
          }

      - name: Check workspace
        run: cargo check --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Check TypeScript bindings
        shell: pwsh
        run: |
          cargo test --features ts-export -p cfd-editor export_bindings
          git diff --exit-code editors/cfd-editor/frontend/src/bindings

      - name: Test and build CFD editor frontend
        run: npm ci && npm test && npm run build
        working-directory: editors/cfd-editor/frontend

      - name: Test VS Code extension
        run: node editors/vscode-coflow/test/extension-unit.test.js

  windows-full:
    name: Windows full installer
    needs: ci
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install editor dependencies
        run: npm ci
        working-directory: editors/cfd-editor

      - name: Install editor frontend dependencies
        run: npm ci
        working-directory: editors/cfd-editor/frontend

      - name: Build CLI sidecar
        run: cargo build --release --target $env:TARGET -p coflow

      - name: Prepare CLI sidecar
        shell: pwsh
        run: |
          $destination = "editors/cfd-editor/src-tauri/binaries/coflow-$env:TARGET.exe"
          New-Item -ItemType Directory -Force (Split-Path $destination) | Out-Null
          Copy-Item "target/$env:TARGET/release/coflow.exe" $destination -Force

      - name: Build full NSIS installer
        run: npm run tauri -- build --target $env:TARGET --bundles nsis --config src-tauri/tauri.release.conf.json
        working-directory: editors/cfd-editor

      - name: Sign updater and stage release assets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is not configured"
          }

          $installer = Get-ChildItem "target/$env:TARGET/release/bundle/nsis/*-setup.exe" |
            Select-Object -First 1
          if (-not $installer) {
            throw "Full NSIS installer was not produced"
          }

          $tauriCli = "editors/cfd-editor/node_modules/@tauri-apps/cli/tauri.js"
          $signArgs = @($tauriCli, "signer", "sign", "--password", "", $installer.FullName)
          & node $signArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to sign the updater installer"
          }

          $signaturePath = "$($installer.FullName).sig"
          $signature = (Get-Content -Raw $signaturePath).Trim()
          if ([string]::IsNullOrWhiteSpace($signature)) {
            throw "Updater signature is empty"
          }

          $assetName = "coflow-tools-windows-x64-setup.exe"

          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item $installer.FullName "release-assets/$assetName" -Force
          Copy-Item $signaturePath "release-assets/$assetName.sig" -Force

          # Emit a fragment describing which updater platform this asset targets.
          # The release job merges fragments from every platform into latest.json.
          Set-Content -Path "release-assets/$assetName.updater" -Encoding utf8NoBOM -Value @(
            "platform=windows-x86_64",
            "asset=$assetName"
          )

      - name: Upload full installer assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-full
          path: release-assets/*

  windows-cli:
    name: Windows CLI-only installer
    needs: ci
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build CLI
        run: cargo build --release --target $env:TARGET -p coflow

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build CLI-only installer
        shell: pwsh
        run: |
          $versionLine = Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' |
            Select-Object -First 1
          $version = $versionLine.Matches[0].Groups[1].Value
          $input = Join-Path $pwd "dist/windows-cli/input"
          $output = Join-Path $pwd "release-assets"
          New-Item -ItemType Directory -Force $input, $output | Out-Null
          Copy-Item "target/$env:TARGET/release/coflow.exe" "$input/coflow.exe" -Force
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            packaging/windows/coflow-cli.iss `
            "/DAppVersion=$version" `
            "/DSourceDir=$input" `
            "/DOutputDir=$output"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to build CLI-only installer"
          }

      - name: Upload CLI-only installer
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-cli
          path: release-assets/coflow-cli-windows-x64-setup.exe

  macos-cli:
    name: macOS CLI ${{ matrix.arch }}
    needs: ci
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p coflow

      - name: Package CLI
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/coflow-cli-macos-${{ matrix.arch }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" coflow

      - name: Upload macOS CLI
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-cli-${{ matrix.arch }}
          path: release-assets/*

  macos-full:
    name: macOS full editor ${{ matrix.arch }}
    needs: ci
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            updater_platform: darwin-aarch64
          - arch: x64
            target: x86_64-apple-darwin
            updater_platform: darwin-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install editor dependencies
        run: npm ci
        working-directory: editors/cfd-editor

      - name: Install editor frontend dependencies
        run: npm ci
        working-directory: editors/cfd-editor/frontend

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          for var in APPLE_CERTIFICATE_P12 APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "$var is not configured" >&2
              exit 1
            fi
          done

          keychain_path="$RUNNER_TEMP/coflow-signing.keychain-db"
          cert_path="$RUNNER_TEMP/coflow-signing.p12"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$cert_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 3600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          rm -f "$cert_path"

          # Persist the keychain path so later steps can unlock/delete it.
          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Build CLI sidecar
        run: cargo build --release --target ${{ matrix.target }} -p coflow

      - name: Prepare CLI sidecar
        run: |
          destination="editors/cfd-editor/src-tauri/binaries/coflow-${{ matrix.target }}"
          mkdir -p "$(dirname "$destination")"
          cp "target/${{ matrix.target }}/release/coflow" "$destination"

      - name: Build full macOS bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles app,dmg --config src-tauri/tauri.release.conf.json
        working-directory: editors/cfd-editor

      - name: Codesign, notarize, and staple
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          for var in APPLE_SIGNING_IDENTITY APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER_ID; do
            if [ -z "${!var:-}" ]; then
              echo "$var is not configured" >&2
              exit 1
            fi
          done

          # Keep the signing keychain unlocked; codesign requires it while
          # notarytool uploads (which can take several minutes).
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          key_path="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          export APPLE_API_KEY_PATH="$key_path"

          app_bundle=$(find "target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' | head -n 1)
          if [ -z "$app_bundle" ]; then
            echo "Full macOS .app bundle was not produced" >&2
            exit 1
          fi

          dmg=$(find "target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' | head -n 1)
          if [ -z "$dmg" ]; then
            echo "Full macOS DMG was not produced" >&2
            exit 1
          fi

          packaging/macos/sign-and-notarize.sh "$app_bundle" "$dmg"

          rm -f "$key_path"

      - name: Stage macOS release assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is not configured" >&2
            exit 1
          fi

          app_bundle=$(find "target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' | head -n 1)
          dmg=$(find "target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' | head -n 1)

          # Sign the updater tarball *after* notarize+staple so the shipped
          # bundle is Gatekeeper-clean and its updater signature matches the
          # exact stapled artifact.
          mkdir -p release-assets
          dmg_asset="coflow-tools-macos-${{ matrix.arch }}.dmg"
          updater_asset="coflow-tools-macos-${{ matrix.arch }}.app.tar.gz"
          cp "$dmg" "release-assets/$dmg_asset"
          tar -czf "release-assets/$updater_asset" \
            -C "$(dirname "$app_bundle")" "$(basename "$app_bundle")"

          node editors/cfd-editor/node_modules/@tauri-apps/cli/tauri.js \
            signer sign --password "" "release-assets/$updater_asset"

          if [ ! -s "release-assets/$updater_asset.sig" ]; then
            echo "Updater signature is empty" >&2
            exit 1
          fi

          # Emit a per-arch fragment consumed by the release job when it
          # assembles the shared latest.json manifest. The updater points at
          # the .app.tar.gz asset; the .dmg stays a plain download.
          {
            printf 'platform=%s\n' '${{ matrix.updater_platform }}'
            printf 'asset=%s\n' "$updater_asset"
          } > "release-assets/$updater_asset.updater"

      - name: Clean up signing keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload full macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-full-${{ matrix.arch }}
          path: release-assets/*

  vsix:
    name: Build VSIX
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Package VSIX
        run: npx --yes @vscode/vsce package
        working-directory: editors/vscode-coflow

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: editors/vscode-coflow/*.vsix

  release:
    name: Create Release
    needs: [windows-full, windows-cli, macos-cli, macos-full, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Assemble updater manifest
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="v$VERSION"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          notes="$(cat RELEASE_NOTES.md)"

          platforms_json="{}"
          shopt -s nullglob
          for fragment in release-assets/*.updater; do
            platform=""
            asset=""
            while IFS='=' read -r key value; do
              case "$key" in
                platform) platform="$value" ;;
                asset)    asset="$value" ;;
              esac
            done < "$fragment"

            if [ -z "$platform" ] || [ -z "$asset" ]; then
              echo "Updater fragment $fragment is missing platform or asset" >&2
              exit 1
            fi

            signature_path="release-assets/$asset.sig"
            if [ ! -s "$signature_path" ]; then
              echo "Updater signature $signature_path is missing" >&2
              exit 1
            fi

            signature="$(tr -d '\n' < "$signature_path")"
            url="https://github.com/$REPO/releases/download/$tag/$asset"

            platforms_json="$(jq \
              --arg platform "$platform" \
              --arg signature "$signature" \
              --arg url "$url" \
              '. + {($platform): {signature: $signature, url: $url}}' \
              <<< "$platforms_json")"
          done

          if [ "$platforms_json" = "{}" ]; then
            echo "No updater fragments were produced" >&2
            exit 1
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms_json" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > release-assets/latest.json

          rm -f release-assets/*.updater

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: release-assets/*
          fail_on_unmatched_files: true
          body_path: RELEASE_NOTES.md
