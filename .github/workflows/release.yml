name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  ci:
    name: CI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check workspace
        run: cargo check --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check TypeScript bindings
        shell: pwsh
        run: |
          cargo test --features ts-export -p cfd-editor export_bindings
          git diff --exit-code editors/cfd-editor/frontend/src/bindings

      - name: Build CFD editor frontend
        run: npm ci && npm run build
        working-directory: editors/cfd-editor/frontend

      - name: Test VS Code extension
        run: node editors/vscode-coflow/test/extension-unit.test.js

  build:
    name: Build ${{ matrix.name }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: coflow.exe
            archive: coflow-windows-x64.zip
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: coflow
            archive: coflow-macos-arm64.tar.gz
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: coflow
            archive: coflow-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}

  vsix:
    name: Build VSIX
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Package VSIX
        run: npx --yes @vscode/vsce package
        working-directory: editors/vscode-coflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: editors/vscode-coflow/*.vsix

  editor:
    name: Build CFD Editor ${{ matrix.name }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: cfd-editor.exe
            archive: cfd-editor-windows-x64.zip
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: cfd-editor
            archive: cfd-editor-macos-arm64.tar.gz
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: cfd-editor
            archive: cfd-editor-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install editor dependencies
        run: npm ci
        working-directory: editors/cfd-editor

      - name: Install editor frontend dependencies
        run: npm ci
        working-directory: editors/cfd-editor/frontend

      - name: Build editor frontend
        run: npm run build
        working-directory: editors/cfd-editor/frontend

      - name: Build editor backend
        run: cargo build --release --package cfd-editor --target ${{ matrix.target }}

      - name: Package editor (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package editor (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Upload editor artifact
        uses: actions/upload-artifact@v4
        with:
          name: editor-${{ matrix.name }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: [build, vsix, editor]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
