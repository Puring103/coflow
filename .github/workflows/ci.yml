name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check workspace
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace
