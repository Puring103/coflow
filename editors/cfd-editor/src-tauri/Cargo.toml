[package]
name = "cfd-editor"
version = "0.1.0"
edition = "2021"
description = "CFD Editor — Tauri 2 desktop app"
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "cfd_editor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
coflow-api = { path = "../../../crates/coflow-api" }
coflow-builtins = { path = "../../../crates/coflow-builtins" }
coflow-cft = { path = "../../../crates/coflow-cft" }
coflow-data-model = { path = "../../../crates/coflow-data-model" }
coflow-engine = { path = "../../../crates/coflow-engine" }
coflow-project = { path = "../../../crates/coflow-project" }
walkdir = "2"
