[package]
name = "cfd-editor"
version = "0.7.2"
edition = "2021"
description = "CFD Editor — Tauri 2 desktop app"
license = "Apache-2.0"
publish = false

[lints]
workspace = true

[lib]
name = "cfd_editor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = []
# When enabled, derives `ts_rs::TS` on wire types and runs the
# `export_bindings` test to refresh `editors/cfd-editor/frontend/src/bindings/`.
ts-export = [
    "dep:ts-rs",
    "coflow-api/ts-export",
    "coflow-data-model/ts-export",
    "coflow-project/ts-export",
    "coflow-runtime/ts-export",
]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
atomicwrites = "0.4.4"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
notify = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
coflow-api = { path = "../../../crates/coflow-api" }
coflow-builtins = { path = "../../../crates/coflow-builtins" }
coflow-cft = { path = "../../../crates/coflow-cft" }
coflow-data-model = { path = "../../../crates/coflow-data-model" }
coflow-project = { path = "../../../crates/coflow-project" }
coflow-runtime = { path = "../../../crates/coflow-runtime" }
coflow = { path = "../../.." }
walkdir = "2"
ts-rs = { version = "10", optional = true }

[dev-dependencies]
rust_xlsxwriter = "0.95"
