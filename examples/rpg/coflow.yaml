schema: schema/

sources:
  - dir: data
    sheets:
      - sheet: Item
        columns:
          Item ID: id
          Name: name
          Rarity: rarity
          Slot: slot
          Level Requirement: level_requirement
          Stack Limit: stack_limit
          Price: price
          Origin: origin
          Tags: tags
          Attributes: attributes
          Elemental Bonus: elemental_bonus
          Upgrade Item ID: upgrade_item
          Featured Stage ID: featured_stage
          Legacy Power: legacy_power
      - sheet: Equipment
        columns:
          Equipment ID: id
          Name: name
          Name Text ID: name_text
          Rarity: rarity
          Slot: slot
          Level Requirement: level_requirement
          Stack Limit: stack_limit
          Price: price
          Origin: origin
          Tags: tags
          Attributes: attributes
          Elemental Bonus: elemental_bonus
          Upgrade Item ID: upgrade_item
          Featured Stage ID: featured_stage
          Legacy Power: legacy_power
          Required Class: required_class
          Stat Bonus: stat_bonus
          Allowed Classes: allowed_classes
          Upgrade Costs: upgrade_costs
          Set Piece ID: set_piece
      - sheet: Skill
        columns:
          Skill ID: id
          Name: name
          Element: element
          Power: power
          Cooldown: cooldown
          Tags: tags
          Passive: is_passive
          Follow Up ID: follow_up
          Buff ID: buff
          Costs: costs
          Allowed Slots: allowed_slots
          Coefficient: coefficient
          Targeting: targeting
      - sheet: Buff
        columns:
          Buff ID: id
          Name: name
          Name Text ID: name_text
          Tags: tags
          Duration: duration
          Max Stacks: max_stacks
          Tick Interval: tick_interval
          Exclusive Group: exclusive_group
          Stat Modifiers: stat_modifiers
          Trigger Chances: trigger_chances
          Required Element: required_element
          Source Skill ID: source_skill
      - sheet: Monster
        columns:
          Monster ID: id
          Name: name
          Level: level
          Rarity: rarity
          Stats: stats
          Position: position
          Resistances: resistances
          Skill ID: skill
          Signature Item ID: signature_item
          Abilities: abilities
          Phases: phases
          Spawn Points: spawn_points
          Flags: flags
      - sheet: Text
        columns:
          Text ID: id
          ZH-CN: zh_cn
          EN-US: en_us
          Context: context
          Max Length: max_length
          Tags: tags

outputs:
  data:
    type: json
    dir: generated/data
  code:
    type: csharp
    dir: generated/csharp
    namespace: Example.Rpg.Config
